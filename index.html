<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88 - World Cup 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e40af, #312e81); }
    .match-card { transition: all 0.3s; }
    .match-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="text-white min-h-screen pb-12">
  <div class="max-w-md mx-auto px-4 py-8">
    <div class="text-center mb-10">
      <h1 class="text-6xl font-black text-red-500">VIVA88</h1>
      <p class="text-3xl text-sky-400 mt-2">WORLD CUP 2026</p>
      <p class="text-amber-400 text-xl">🤖 AI DỰ ĐOÁN • <span id="count">104</span> TRẬN</p>
    </div>

    <div id="content" class="space-y-4"></div>
  </div>

  <script>
    let allMatches = [];
    const leagues = ["Vòng Bảng", "Vòng 16", "Tứ Kết", "Bán Kết", "Chung Kết"];

    for (let i = 1; i <= 104; i++) {
      const league = leagues[Math.floor((i-1)/25)];
      allMatches.push({
        id: i,
        match: `Trận ${i} - Đội A vs Đội B`,
        league: league + " World Cup 2026"
      });
    }

    function renderMatches() {
      let html = '';
      allMatches.forEach(m => {
        html += `
          <div class="match-card bg-zinc-900/80 border border-sky-500/30 rounded-3xl p-5">
            <div class="flex justify-between text-xs text-sky-400 mb-2">
              <span>#${m.id}</span>
              <span>${m.league}</span>
            </div>
            <div class="text-lg font-semibold">${m.match}</div>
            <button onclick="getPrediction('${m.match}')" 
              class="w-full mt-4 bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 py-4 rounded-2xl font-bold">
              🤖 AI DỰ ĐOÁN
            </button>
          </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    function getPrediction(match) {
      const prob = Math.floor(Math.random() * 45) + 50;
      alert(`🤖 AI VIVA88\n\n${match}\n\nXác suất thắng: ${prob}%\nGợi ý: Nên cược mạnh!`);
    }

    // Chạy ngay khi mở trang
    window.onload = renderMatches;
  </script>
</body>
</html>
