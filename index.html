<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom, #0a1428, #1e3a8a); }
  </style>
</head>
<body class="text-white min-h-screen pb-20">
  <div class="max-w-md mx-auto">

    <!-- Login -->
    <div id="loginScreen" class="p-6">
      <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>
      <div class="bg-zinc-900 rounded-3xl p-8">
        <input id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
        <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
          <option value="player">Thành viên</option>
          <option value="agent">Đại lý</option>
          <option value="admin">Admin (Khoa)</option>
        </select>
        <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
      </div>
    </div>

    <!-- Main -->
    <div id="mainScreen" class="hidden">
      <div class="flex justify-between p-4 bg-zinc-900">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-5 py-2 rounded-2xl">Đăng xuất</button>
      </div>

      <div id="userInfo" class="bg-zinc-900 p-4 text-center"></div>

      <!-- Tabs -->
      <div class="flex bg-zinc-800">
        <button onclick="showTab(0)" class="flex-1 py-4 tab active" id="tab0">⚽ Bóng Đá</button>
        <button onclick="showTab(1)" class="flex-1 py-4 tab" id="tab1">🎰 Casino</button>
        <button onclick="showTab(2)" class="flex-1 py-4 tab" id="tab2">🐟 Bắn Cá</button>
      </div>

      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let points = 50000;
    let username = '';
    let currentRole = '';
    let history = [];

    const matches = [
      {league:"Premier League Ảo", match:"Man City vs Liverpool", home:1.85, draw:3.6, away:4.1},
      {league:"La Liga Ảo", match:"Real Madrid vs Barcelona", home:2.1, draw:3.4, away:3.2},
      {league:"Bundesliga Ảo", match:"Bayern vs Dortmund", home:1.7, draw:4.0, away:4.5},
      {league:"Serie A Ảo", match:"Juventus vs Inter", home:2.3, draw:3.2, away:3.0},
      {league:"V.League Ảo", match:"Hà Nội vs TP.HCM", home:2.2, draw:3.3, away:3.1}
    ];

    function login() {
      username = document.getElementById('username').value || "Khoa";
      currentRole = document.getElementById('role').value;
      
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      
      document.getElementById('userInfo').innerHTML = `
        <p class="text-green-400">Chào \( {username} ( \){currentRole})</p>
        <p class="text-4xl font-bold text-yellow-400" id="pointsDisplay">${points.toLocaleString('vi-VN')} Điểm</p>
      `;

      showTab(0);
    }

    function logout() { location.reload(); }

    function updatePoints() {
      document.getElementById('pointsDisplay').textContent = points.toLocaleString('vi-VN') + " Điểm";
    }

    function placeBet(odds, selection, match) {
      const amount = parseInt(prompt(`Cược ${selection} - ${match}\nTỉ lệ ${odds}\nNhập số điểm:`, "1000"));
      if (!amount || amount > points) return alert("Không đủ điểm!");

      points -= amount;
      const potentialWin = Math.round(amount * odds);
      history.unshift({time: new Date().toLocaleString('vi-VN'), match, selection, amount, potentialWin});
      updatePoints();

      alert(`✅ Cược ${selection} thành công!\nNếu thắng nhận ${potentialWin} điểm!`);
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab' + tab).classList.add('active');

      let html = '';
      if (tab === 0) {
        html = `<h2 class="text-2xl font-bold mb-6 text-center">Bóng Đá Ảo</h2>`;
        matches.forEach(m => {
          html += `
            <div class="bg-zinc-900 p-6 rounded-3xl mb-6">
              <p class="text-yellow-400">${m.league}</p>
              <h3 class="font-bold">${m.match}</h3>
              <div class="grid grid-cols-3 gap-3 mt-4">
                <button onclick="placeBet(\( {m.home}, 'Thắng', ' \){m.match}')" class="bg-green-600 py-6 rounded-2xl font-bold">${m.home}</button>
                <button onclick="placeBet(\( {m.draw}, 'Hòa', ' \){m.match}')" class="bg-yellow-600 py-6 rounded-2xl font-bold">${m.draw}</button>
                <button onclick="placeBet(\( {m.away}, 'Thua', ' \){m.match}')" class="bg-red-600 py-6 rounded-2xl font-bold">${m.away}</button>
              </div>
            </div>`;
        });
      } else if (tab === 1) {
        html = `<h2 class="text-2xl font-bold mb-8 text-center">🎰 CASINO</h2>
                <button onclick="playCasino()" class="w-full bg-purple-600 py-20 rounded-3xl text-3xl font-bold">TÀI XỈU</button>`;
      } else {
        html = `<h2 class="text-2xl font-bold mb-8 text-center">🐟 BẮN CÁ</h2>
                <button onclick="playFish()" class="w-full bg-teal-600 py-20 rounded-3xl text-3xl font-bold">BẮT ĐẦU</button>`;
      }
      document.getElementById('tabContent').innerHTML = html;
    }

    function playCasino() {
      const win = Math.random() > 0.5;
      if (win) {
        points += 30000;
        alert("🎉 THẮNG LỚN +30.000 điểm!");
      } else {
        alert("😢 Thua. Thử lại!");
      }
      updatePoints();
    }

    function playFish() {
      const win = Math.random() > 0.4;
      if (win) {
        points += 40000;
        alert("🐟 BẮN TRÚNG CÁ LỚN +40.000 điểm!");
      } else {
        alert("🐟 Bắn hụt...");
      }
      updatePoints();
    }
  </script>
</body>
</html>
