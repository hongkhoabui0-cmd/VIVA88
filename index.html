<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <h2 class="text-xl font-bold mb-6 text-center">Man City vs Liverpool</h2>
      <div class="grid grid-cols-3 gap-4">
        <button onclick="cuoc(1.85, 'Thắng')" class="bg-green-600 py-10 rounded-2xl font-bold text-2xl">1.85</button>
        <button onclick="cuoc(3.6, 'Hòa')" class="bg-yellow-600 py-10 rounded-2xl font-bold text-2xl">3.60</button>
        <button onclick="cuoc(4.1, 'Thua')" class="bg-red-600 py-10 rounded-2xl font-bold text-2xl">4.10</button>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 text-center">
      <p class="text-3xl font-bold text-yellow-400" id="diem">50.000 Điểm</p>
    </div>
  </div>

  <script>
    let diem = 50000;

    function cuoc(tyle, ketqua) {
      const input = prompt(`Cược ${ketqua} - Tỉ lệ ${tyle}\nNhập số điểm cược:`, "1000");
      if (input === null) return; // bấm cancel

      const soTien = parseInt(input);
      if (isNaN(soTien) || soTien <= 0) {
        alert("❌ Số điểm không hợp lệ!");
        return;
      }
      if (soTien > diem) {
        alert("❌ Không đủ điểm!");
        return;
      }

      // Thực hiện cược
      diem -= soTien;
      document.getElementById("diem").textContent = diem.toLocaleString('vi-VN') + " Điểm";

      const thang = Math.round(soTien * tyle);
      alert(`✅ ĐÃ CƯỢC THÀNH CÔNG!\nCược ${ketqua} ${soTien} điểm\nNếu thắng nhận ${thang} điểm!`);
    }
  </script>
</body>
</html>
