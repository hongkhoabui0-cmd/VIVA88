<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div id="loginScreen" class="bg-zinc-900 rounded-3xl p-6">
      <h2 class="text-2xl font-bold mb-6 text-center">Đăng Nhập VIVA88</h2>
      <input id="username" value="Khoa" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
        <option value="admin">Admin (Khoa)</option>
        <option value="agent">Đại lý</option>
        <option value="player">Thành viên</option>
      </select>
      <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
    </div>

    <div id="mainScreen" class="hidden">
      <div class="p-4 bg-zinc-900 flex justify-between">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-6 py-2 rounded-2xl">Đăng xuất</button>
      </div>
      <div id="userInfo" class="p-4 text-center"></div>
      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let agents = JSON.parse(localStorage.getItem('agents')) || [];
    let members = JSON.parse(localStorage.getItem('members')) || [];

    function saveData() {
      localStorage.setItem('agents', JSON.stringify(agents));
      localStorage.setItem('members', JSON.stringify(members));
    }

    function login() {
      const username = document.getElementById('username').value.trim() || "Khoa";
      const role = document.getElementById('role').value;

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');

      document.getElementById('userInfo').innerHTML = `<p class="text-green-400">Chào ${username} (${role})</p>`;

      if (role === 'admin') showAdmin();
      else if (role === 'agent') showAgent();
      else showPlayer();
    }

    function logout() { location.reload(); }

    function showAdmin() {
      document.getElementById('tabContent').innerHTML = `
        <h2 class="text-2xl font-bold mb-6 text-orange-400">👑 Admin Panel</h2>
        <button onclick="createAgent()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold mb-4">Tạo Đại Lý Mới</button>
        <button onclick="showAgentsList()" class="w-full bg-blue-600 py-6 rounded-3xl font-bold">📋 Xem Danh Sách Đại Lý + Điểm</button>
      `;
    }

    function createAgent() {
      const name = prompt("Nhập tên Đại Lý mới:");
      if (name && name.trim() !== "") {
        agents.push({username: name.trim(), points: 50000});
        saveData();
        alert(`✅ Tạo Đại Lý "${name}" thành công!`);
        showAgentsList();
      }
    }

    function showAgentsList() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">📋 Danh Sách Đại Lý + Điểm</h2>`;
      if (agents.length === 0) {
        html += `<p class="text-center text-zinc-400">Chưa có đại lý nào</p>`;
      } else {
        agents.forEach(a => {
          html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3 flex justify-between">
            <span>${a.username}</span>
            <span class="text-yellow-400 font-bold">${a.points.toLocaleString('vi-VN')} Điểm</span>
          </div>`;
        });
      }
      document.getElementById('tabContent').innerHTML = html;
    }

    function showAgent() {
      document.getElementById('tabContent').innerHTML = `
        <h2 class="text-2xl font-bold mb-6 text-orange-400">Đại Lý Panel</h2>
        <button onclick="createMember()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold mb-4">Tạo Thành Viên Mới</button>
        <button onclick="showMembersList()" class="w-full bg-blue-600 py-6 rounded-3xl font-bold">📋 Xem Danh Sách Thành Viên + Điểm</button>
      `;
    }

    function createMember() {
      const name = prompt("Nhập tên Thành Viên mới:");
      if (name && name.trim() !== "") {
        members.push({username: name.trim(), points: 20000});
        saveData();
        alert(`✅ Tạo Thành Viên "${name}" thành công!`);
        showMembersList();
      }
    }

    function showMembersList() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">📋 Danh Sách Thành Viên + Điểm</h2>`;
      if (members.length === 0) {
        html += `<p class="text-center text-zinc-400">Chưa có thành viên nào</p>`;
      } else {
        members.forEach(m => {
          html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3 flex justify-between">
            <span>${m.username}</span>
            <span class="text-yellow-400 font-bold">${m.points.toLocaleString('vi-VN')} Điểm</span>
          </div>`;
        });
      }
      document.getElementById('tabContent').innerHTML = html;
    }

    function showPlayer() {
      document.getElementById('tabContent').innerHTML = `<h2 class="text-2xl font-bold mb-6 text-orange-400">Chào Thành Viên</h2><p class="text-center">Chức năng chơi game đang hoạt động</p>`;
    }
  </script>
</body>
</html>
