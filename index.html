<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('https://picsum.photos/id/1015/1920/1080') center/cover fixed; }
    .card { background: rgba(15, 23, 42, 0.95); }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-md mx-auto p-4" id="app">

    <!-- Login -->
    <div id="loginScreen">
      <div class="text-center py-12">
        <h1 class="text-6xl font-black text-red-500">VIVA88</h1>
        <p class="text-sky-400 text-2xl">Cá Cược Điểm Ảo</p>
      </div>
      <input id="username" placeholder="Tên đăng nhập" class="w-full p-5 rounded-3xl bg-zinc-900 mb-4 text-lg">
      <select id="role" class="w-full p-5 rounded-3xl bg-zinc-900 mb-6 text-lg">
        <option value="member">Thành Viên</option>
        <option value="agent">Đại Lý</option>
        <option value="admin">Admin - Khoa</option>
      </select>
      <button onclick="login()" class="w-full py-6 bg-red-600 rounded-3xl text-xl font-bold">ĐĂNG NHẬP</button>
    </div>

    <!-- Main -->
    <div id="mainScreen" class="hidden">
      <div class="flex justify-between items-center mb-6 bg-zinc-900 p-4 rounded-3xl">
        <h1 id="title" class="text-3xl font-bold"></h1>
        <button onclick="logout()" class="px-6 py-3 bg-zinc-700 rounded-2xl">Đăng xuất</button>
      </div>
      <div id="panel"></div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let data = JSON.parse(localStorage.getItem('viva88Data')) || { members: [] };

    function saveData() { localStorage.setItem('viva88Data', JSON.stringify(data)); }

    function login() {
      const username = document.getElementById('username').value.trim();
      if (!username) return alert("Nhập tên đăng nhập!");

      const role = document.getElementById('role').value;
      currentUser = { username, role };

      if (role === 'member') {
        let m = data.members.find(x => x.username === username);
        if (!m) {
          m = {username, points: 50000};
          data.members.push(m);
        }
        currentUser.points = m.points;
        currentUser.memberData = m;
      }

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      renderPanel();
    }

    function logout() { location.reload(); }

    function renderPanel() {
      const panel = document.getElementById('panel');
      const title = document.getElementById('title');

      if (currentUser.role === 'member') {
        title.textContent = '⚽ THÀNH VIÊN';
        panel.innerHTML = memberPanel();
      } else {
        title.textContent = currentUser.role === 'admin' ? '👑 ADMIN KHOA' : '👔 ĐẠI LÝ';
        panel.innerHTML = `<div class="card p-10 text-center text-xl rounded-3xl">Panel ${currentUser.role} đang hoàn thiện</div>`;
      }
    }

    function memberPanel() {
      let html = `
        <div class="card p-6 rounded-3xl text-center mb-8">
          <div class="text-4xl mb-4">⚽</div>
          <div class="text-3xl font-bold text-yellow-400">Điểm: ${currentUser.points.toLocaleString()} đ</div>
        </div>`;

      // Danh sách trận đơn giản (demo)
      html += `<h2 class="text-xl font-bold mb-4 text-center">📋 Danh sách trận đấu</h2>`;
      const matches = [
        ["Brazil vs Argentina", "1.85", "3.4", "2.1"],
        ["France vs England", "2.1", "3.3", "1.9"],
        ["Germany vs Spain", "2.0", "3.5", "2.0"]
      ];

      matches.forEach(([match, o1, o2, o3], i) => {
        html += `
          <div class="card p-5 rounded-3xl mb-5">
            <div class="font-bold mb-4">${match}</div>
            <div class="grid grid-cols-3 gap-3">
              <button onclick="placeBet('${match}', 'Nhà', ${o1})" class="py-4 bg-green-600 rounded-2xl text-sm font-bold">Nhà ${o1}</button>
              <button onclick="placeBet('${match}', 'Hòa', ${o2})" class="py-4 bg-yellow-600 rounded-2xl text-sm font-bold">Hòa ${o2}</button>
              <button onclick="placeBet('${match}', 'Khách', ${o3})" class="py-4 bg-red-600 rounded-2xl text-sm font-bold">Khách ${o3}</button>
            </div>
          </div>`;
      });

      return html;
    }

    function placeBet(match, type, odds) {
      const amount = parseInt(prompt(`Đặt cược ${match}\nKèo: ${type}\nTỉ lệ: ${odds}`, "10000"));
      if (!amount || amount > currentUser.points) return alert("Không đủ điểm!");

      currentUser.points -= amount;
      currentUser.memberData.points = currentUser.points;

      const isWin = Math.random() > 0.5;
      if (isWin) {
        const win = Math.floor(amount * odds);
        currentUser.points += win;
        currentUser.memberData.points = currentUser.points;
        alert(`🎉 THẮNG! +${win.toLocaleString()} điểm`);
      } else {
        alert(`❌ THUA - Mất ${amount.toLocaleString()} điểm`);
      }

      renderPanel();
      saveData();
    }
  </script>
</body>
</html>
