<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div id="loginScreen" class="bg-zinc-900 rounded-3xl p-6">
      <input id="username" value="Khoa" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
        <option value="player">Thành viên</option>
        <option value="agent">Đại lý</option>
        <option value="admin">Admin (Khoa)</option>
      </select>
      <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
    </div>

    <div id="mainScreen" class="hidden">
      <div class="flex justify-between p-4 bg-zinc-900">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-5 py-2 rounded-2xl">Đăng xuất</button>
      </div>

      <div id="userInfo" class="bg-zinc-900 p-4 text-center"></div>
      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let points = 50000;
    let history = [];

    function login() {
      const role = document.getElementById('role').value;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      document.getElementById('userInfo').innerHTML = `
        <p class="text-green-400">Chào Khoa (${role})</p>
        <p class="text-4xl font-bold text-yellow-400" id="pointsDisplay">${points.toLocaleString('vi-VN')} Điểm</p>
      `;

      if (role === 'admin') showAdmin();
      else if (role === 'agent') showAgent();
      else showPlayer();
    }

    function logout() { location.reload(); }

    function updatePoints() {
      document.getElementById('pointsDisplay').textContent = points.toLocaleString('vi-VN') + " Điểm";
    }

    function bet(odds, choice) {
      const amount = parseInt(prompt(`Cược ${choice}\nTỉ lệ ${odds}\nNhập số điểm:`, "1000"));
      if (!amount || isNaN(amount) || amount <= 0) return alert("❌ Số điểm không hợp lệ!");
      if (amount > points) return alert("❌ Không đủ điểm!");

      points -= amount;
      updatePoints();
      alert(`✅ Cược ${choice} ${amount} điểm thành công!`);
    }

    function showPlayer() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">Bóng Đá Ảo</h2>
        <div class="bg-zinc-900 p-6 rounded-3xl">
          <h3 class="font-bold mb-4">Man City vs Liverpool</h3>
          <div class="grid grid-cols-3 gap-4">
            <button onclick="bet(1.85, 'Thắng')" class="bg-green-600 py-8 rounded-2xl font-bold">1.85</button>
            <button onclick="bet(3.6, 'Hòa')" class="bg-yellow-600 py-8 rounded-2xl font-bold">3.60</button>
            <button onclick="bet(4.1, 'Thua')" class="bg-red-600 py-8 rounded-2xl font-bold">4.10</button>
          </div>
        </div>`;
      document.getElementById('tabContent').innerHTML = html;
    }

    function showAgent() {
      document.getElementById('tabContent').innerHTML = `<h2 class="text-2xl font-bold mb-6 text-orange-400">Đại Lý Panel</h2><p class="text-center">Chức năng Đại lý đang phát triển</p>`;
    }

    function showAdmin() {
      document.getElementById('tabContent').innerHTML = `<h2 class="text-2xl font-bold mb-6 text-orange-400">👑 Admin Panel</h2><p class="text-center">Chức năng Admin đang phát triển</p>`;
    }
  </script>
</body>
</html>
