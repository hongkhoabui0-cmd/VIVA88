<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88 - AI + API Bóng Đá</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>
    <h2 class="text-2xl font-bold text-center mb-8 text-sky-400">🤖 AI + API Dự Đoán Bóng Đá</h2>

    <div id="content" class="space-y-6"></div>
  </div>

  <script>
    const API_KEY = "9fb24f52024e8386a86543601550d805";

    async function loadLiveMatches() {
      document.getElementById('content').innerHTML = `<p class="text-center">Đang tải dữ liệu từ API...</p>`;

      try {
        const response = await fetch("https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all", {
          method: "GET",
          headers: {
            "x-rapidapi-key": API_KEY,
            "x-rapidapi-host": "api-football-v1.p.rapidapi.com"
          }
        });

        const data = await response.json();
        let html = `<h2 class="text-xl font-bold mb-6 text-sky-400">Trận Đang Diễn Ra / Sắp Diễn Ra</h2>`;

        if (data.response && data.response.length > 0) {
          data.response.forEach(f => {
            const home = f.teams.home.name;
            const away = f.teams.away.name;
            html += `
              <div class="bg-zinc-900 p-6 rounded-3xl mb-6">
                <div class="font-bold mb-2">${home} vs ${away}</div>
                <button onclick="getAIPrediction('${home} vs ${away}')" class="w-full bg-sky-600 py-4 rounded-2xl font-bold">🤖 AI Dự Đoán Trận Này</button>
              </div>`;
          });
        } else {
          html += `<p class="text-center text-zinc-400">Hiện không có trận nào đang live. Dùng AI dự đoán bên dưới.</p>`;
        }

        document.getElementById('content').innerHTML = html;
      } catch (e) {
        document.getElementById('content').innerHTML = `<p class="text-red-400 text-center">Lỗi kết nối API. Dùng chế độ AI mock.</p>`;
        generateMockPredictions();
      }
    }

    function getAIPrediction(match) {
      const prob = Math.floor(Math.random() * 35) + 55;
      alert(`🤖 AI DỰ ĐOÁN\n\nTrận: ${match}\nXác suất Thắng Nhà: ${prob}%\nGợi ý: Nên cược Thắng!`);
    }

    function generateMockPredictions() {
      const matches = ["Man City vs Liverpool", "Real Madrid vs Barcelona", "Vietnam vs Thailand", "World Cup Qualifier"];
      let html = `<h2 class="text-xl font-bold mb-6 text-sky-400">Dự Đoán Các Trận Nổi Bật</h2>`;
      matches.forEach(m => {
        html += `
          <div class="bg-zinc-900 p-6 rounded-3xl mb-6">
            <div class="font-bold mb-2">${m}</div>
            <button onclick="getAIPrediction('${m}')" class="w-full bg-sky-600 py-4 rounded-2xl font-bold">🤖 AI Dự Đoán</button>
          </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    window.onload = loadLiveMatches;
  </script>
</body>
</html>
