<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom, #0a1428, #1e3a8a); }
    .tab-active { border-bottom: 4px solid #f97316; color: #fff !important; }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-md mx-auto">

    <!-- Login -->
    <div id="loginScreen" class="p-6">
      <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>
      <div class="bg-zinc-900 rounded-3xl p-8">
        <input id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
        <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
          <option value="player">Thành viên</option>
          <option value="agent">Đại lý</option>
          <option value="admin">Admin (Khoa)</option>
        </select>
        <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
      </div>
    </div>

    <!-- Main -->
    <div id="mainScreen" class="hidden">
      <div class="flex justify-between p-4 bg-zinc-900 border-b border-orange-500">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-5 py-2 rounded-2xl">Đăng xuất</button>
      </div>

      <div id="userInfo" class="bg-zinc-900 p-4 text-center"></div>

      <!-- Tabs -->
      <div class="flex bg-zinc-800 text-sm">
        <button onclick="showTab(0)" class="flex-1 py-4 tab-active" id="tab0">⚽ Bóng Đá</button>
        <button onclick="showTab(1)" class="flex-1 py-4" id="tab1">🎰 Casino</button>
        <button onclick="showTab(2)" class="flex-1 py-4" id="tab2">🐟 Bắn Cá</button>
        <button onclick="showTab(3)" class="flex-1 py-4" id="tab3">📜 Lịch sử</button>
      </div>

      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let points = 50000;
    let username = '';
    let currentRole = '';
    let history = [];

    const matches = [
      {league:"Premier League Ảo", match:"Man City vs Liverpool", home:1.85, draw:3.6, away:4.1},
      {league:"La Liga Ảo", match:"Real Madrid vs Barcelona", home:2.1, draw:3.4, away:3.2},
      {league:"Bundesliga Ảo", match:"Bayern vs Dortmund", home:1.7, draw:4.0, away:4.5},
      {league:"Serie A Ảo", match:"Juventus vs Inter", home:2.3, draw:3.2, away:3.0},
      {league:"V.League Ảo", match:"Hà Nội vs TP.HCM", home:2.2, draw:3.3, away:3.1},
      {league:"Champions League Ảo", match:"PSG vs Arsenal", home:2.4, draw:3.5, away:2.8}
    ];

    function login() {
      username = document.getElementById('username').value || "Khoa";
      currentRole = document.getElementById('role').value;
      
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      
      document.getElementById('userInfo').innerHTML = `
        <p class="text-green-400">Chào \( {username} ( \){currentRole})</p>
        <p class="text-4xl font-bold text-yellow-400" id="pointsDisplay">${points.toLocaleString('vi-VN')} Điểm</p>
      `;

      if (currentRole === 'admin') showAdminPanel();
      else showTab(0);
    }

    function logout() { location.reload(); }

    function updatePoints() {
      document.getElementById('pointsDisplay').textContent = points.toLocaleString('vi-VN') + " Điểm";
    }

    function placeBet(odds, selection, match) {
      const amount = parseInt(prompt(`Cược ${selection} - ${match}\nTỉ lệ ${odds}\nNhập số điểm:`, "1000"));
      if (!amount || amount > points) return alert("❌ Không đủ điểm!");

      points -= amount;
      const potentialWin = Math.round(amount * odds);
      history.unshift({time: new Date().toLocaleString('vi-VN'), match, selection, amount, potentialWin, status: "Chưa kết quả"});
      updatePoints();

      alert(`✅ Cược ${selection} thành công!\nNếu thắng nhận ${potentialWin} điểm!`);
    }

    function showTab(tab) {
      document.querySelectorAll('#tabContent button').forEach(b => b.classList.remove('tab-active'));
      document.getElementById('tab' + tab).classList.add('tab-active');

      let html = '';
      if (tab === 0) {
        html = `<h2 class="text-2xl font-bold mb-6 text-center text-orange-400">Bóng Đá Ảo</h2>`;
        matches.forEach(m => {
          html += `
            <div class="bg-zinc-900 p-6 rounded-3xl mb-6 border border-orange-500">
              <p class="text-yellow-400">${m.league}</p>
              <h3 class="font-bold text-lg">${m.match}</h3>
              <div class="grid grid-cols-3 gap-3 mt-4">
                <button onclick="placeBet(\( {m.home}, 'Thắng', ' \){m.match}')" class="bg-green-600 py-6 rounded-2xl font-bold text-lg">${m.home}</button>
                <button onclick="placeBet(\( {m.draw}, 'Hòa', ' \){m.match}')" class="bg-yellow-600 py-6 rounded-2xl font-bold text-lg">${m.draw}</button>
                <button onclick="placeBet(\( {m.away}, 'Thua', ' \){m.match}')" class="bg-red-600 py-6 rounded-2xl font-bold text-lg">${m.away}</button>
              </div>
            </div>`;
        });
      } else if (tab === 1) {
        html = `<h2 class="text-2xl font-bold mb-8 text-center">🎰 CASINO</h2>
                <button onclick="playCasino()" class="w-full bg-purple-600 py-20 rounded-3xl text-3xl font-bold">TÀI XỈU</button>`;
      } else if (tab === 2) {
        html = `<h2 class="text-2xl font-bold mb-8 text-center">🐟 BẮN CÁ</h2>
                <button onclick="playFish()" class="w-full bg-teal-600 py-20 rounded-3xl text-3xl font-bold">BẮT ĐẦU</button>`;
      } else if (tab === 3) {
        html = `<h2 class="text-2xl font-bold mb-6">📜 Lịch sử cược</h2>`;
        if (history.length === 0) html += `<p class="text-center text-gray-400">Chưa có vé cược</p>`;
        else history.forEach(h => {
          html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3 text-sm">
            <div>${h.time}</div>
            <div>${h.match} - ${h.selection}</div>
            <div class="text-green-400">${h.amount}đ → ${h.potentialWin}đ</div>
          </div>`;
        });
      }
      document.getElementById('tabContent').innerHTML = html;
    }

    function playCasino() {
      const win = Math.random() > 0.5;
      if (win) { points += 35000; alert("🎉 THẮNG LỚN +35.000 điểm!"); }
      else alert("😢 Thua. Thử lại!");
      updatePoints();
    }

    function playFish() {
      const win = Math.random() > 0.4;
      if (win) { points += 45000; alert("🐟 BẮN TRÚNG CÁ LỚN +45.000 điểm!"); }
      else alert("🐟 Bắn hụt...");
      updatePoints();
    }

    function showAdminPanel() {
      let html = `
        <h2 class="text-2xl font-bold mb-6 text-center text-orange-400">👑 Admin Panel - Khoa</h2>
        <div class="space-y-4">
          <button onclick="alert('✅ Đã chỉnh sửa tất cả kèo thành công!')" class="w-full bg-violet-600 py-6 rounded-3xl font-bold">Chỉnh sửa Kèo</button>
          <button onclick="let newPoints = prompt('Nhập số điểm mới cho thành viên:', '100000'); if(newPoints) {points = parseInt(newPoints); updatePoints(); alert('Đã chỉnh điểm!');}" class="w-full bg-amber-600 py-6 rounded-3xl font-bold">Chỉnh Điểm Thành Viên</button>
          <button onclick="alert('📋 Đang xem tất cả vé cược...')" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Quản lý Vé Cược</button>
        </div>`;
      document.getElementById('tabContent').innerHTML = html;
    }
  </script>
</body>
</html>
