<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div id="loginScreen" class="bg-zinc-900 rounded-3xl p-6">
      <h2 class="text-2xl font-bold mb-6 text-center">Đăng Nhập VIVA88</h2>
      <input id="username" placeholder="Tên đăng nhập" value="Khoa" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
        <option value="player">Thành viên</option>
        <option value="agent">Đại lý</option>
        <option value="admin">Admin (Khoa)</option>
      </select>
      <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
    </div>

    <div id="mainScreen" class="hidden">
      <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-t-3xl">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-6 py-3 rounded-2xl font-bold">Đăng xuất</button>
      </div>
      <div id="userInfo" class="bg-zinc-900 p-4 text-center border-b border-zinc-700"></div>
      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let currentUser = {};
    let history = JSON.parse(localStorage.getItem('vivaHistory')) || [];
    let agents = JSON.parse(localStorage.getItem('vivaAgents')) || [];
    let members = JSON.parse(localStorage.getItem('vivaMembers')) || [];

    function saveData() {
      localStorage.setItem('vivaHistory', JSON.stringify(history));
      localStorage.setItem('vivaAgents', JSON.stringify(agents));
      localStorage.setItem('vivaMembers', JSON.stringify(members));
    }

    function login() {
      const username = document.getElementById('username').value.trim() || "Khoa";
      const role = document.getElementById('role').value;
      currentUser = { username, role, points: 50000 };

      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');

      document.getElementById('userInfo').innerHTML = `
        <p class="text-green-400">Chào ${username} (${role})</p>
        <p class="text-4xl font-bold text-yellow-400" id="pointsDisplay">50.000 Điểm</p>
      `;

      if (role === 'admin') showAdmin();
      else if (role === 'agent') showAgent();
      else showPlayer();
    }

    function logout() { location.reload(); }

    function updatePointsDisplay() {
      document.getElementById('pointsDisplay').textContent = currentUser.points.toLocaleString('vi-VN') + " Điểm";
    }

    // ==================== ADMIN ====================
    function showAdmin() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">👑 Admin Panel - Khoa</h2>
        <div class="space-y-4">
          <button onclick="createAgent()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold">Tạo Đại Lý Mới</button>
          <button onclick="showAgentsList()" class="w-full bg-blue-600 py-6 rounded-3xl font-bold">Xem Danh Sách Đại Lý + Điểm</button>
          <button onclick="adminPumpAgent()" class="w-full bg-green-600 py-6 rounded-3xl font-bold">Bơm Điểm Đại Lý</button>
          <button onclick="adminWithdrawAgent()" class="w-full bg-red-600 py-6 rounded-3xl font-bold">Rút Điểm Đại Lý</button>
          <button onclick="aiPredictAdmin()" class="w-full bg-sky-600 py-6 rounded-3xl font-bold">🤖 AI Dự Đoán Kèo</button>
          <button onclick="showHistory()" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Xem Toàn Bộ Lịch Sử</button>
        </div>`;
      document.getElementById('tabContent').innerHTML = html;
    }

    function createAgent() {
      const name = prompt("Nhập tên Đại Lý mới:");
      if (name) {
        agents.push({username: name, points: 50000});
        saveData();
        alert(`✅ Tạo Đại Lý "${name}" thành công!`);
      }
    }

    function showAgentsList() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">📋 Danh Sách Đại Lý + Điểm</h2>`;
      if (agents.length === 0) html += `<p class="text-center text-zinc-400">Chưa có đại lý nào</p>`;
      else agents.forEach(a => {
        html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3">${a.username} — ${a.points.toLocaleString('vi-VN')} Điểm</div>`;
      });
      document.getElementById('tabContent').innerHTML = html;
    }

    function adminPumpAgent() {
      const name = prompt("Nhập tên Đại Lý cần BƠM điểm:");
      const amount = parseInt(prompt("Nhập số điểm muốn bơm:", "10000"));
      if (name && amount > 0) {
        const agent = agents.find(a => a.username === name);
        if (agent) {
          agent.points += amount;
          saveData();
          alert(`✅ Đã BƠM ${amount.toLocaleString('vi-VN')} điểm cho ${name}`);
        } else alert("❌ Không tìm thấy Đại Lý!");
      }
    }

    function adminWithdrawAgent() {
      const name = prompt("Nhập tên Đại Lý cần RÚT điểm:");
      const amount = parseInt(prompt("Nhập số điểm muốn rút:", "5000"));
      if (name && amount > 0) {
        const agent = agents.find(a => a.username === name);
        if (agent) {
          if (agent.points >= amount) {
            agent.points -= amount;
            saveData();
            alert(`✅ Đã RÚT ${amount.toLocaleString('vi-VN')} điểm từ ${name}`);
          } else alert("❌ Đại Lý không đủ điểm!");
        } else alert("❌ Không tìm thấy Đại Lý!");
      }
    }

    function aiPredictAdmin() {
      const matches = ["Man City vs Liverpool", "Real Madrid vs Barcelona", "Hà Nội vs TP.HCM"];
      const match = matches[Math.floor(Math.random()*matches.length)];
      const prob = Math.floor(Math.random() * 35) + 50;
      alert(`🤖 AI DỰ ĐOÁN (Admin only)\n\nTrận: ${match}\nXác suất Thắng: ${prob}%\nGợi ý: Nên cược Thắng!`);
    }

    // ==================== ĐẠI LÝ ====================
    function showAgent() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">Đại Lý Panel</h2>
        <div class="space-y-4">
          <button onclick="createMember()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold">Tạo Thành Viên Mới</button>
          <button onclick="showMembersList()" class="w-full bg-blue-600 py-6 rounded-3xl font-bold">Xem Danh Sách Thành Viên + Điểm</button>
          <button onclick="agentPumpMember()" class="w-full bg-green-600 py-6 rounded-3xl font-bold">Bơm Điểm Thành Viên</button>
          <button onclick="agentWithdrawMember()" class="w-full bg-red-600 py-6 rounded-3xl font-bold">Rút Điểm Thành Viên</button>
          <button onclick="showHistory()" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Xem Lịch Sử</button>
        </div>`;
      document.getElementById('tabContent').innerHTML = html;
    }

    function createMember() {
      const name = prompt("Nhập tên Thành Viên mới:");
      if (name) {
        members.push({username: name, points: 20000});
        saveData();
        alert(`✅ Tạo Thành Viên "${name}" thành công!`);
      }
    }

    function showMembersList() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">📋 Danh Sách Thành Viên + Điểm</h2>`;
      if (members.length === 0) html += `<p class="text-center text-zinc-400">Chưa có thành viên nào</p>`;
      else members.forEach(m => {
        html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3">${m.username} — ${m.points.toLocaleString('vi-VN')} Điểm</div>`;
      });
      document.getElementById('tabContent').innerHTML = html;
    }

    function agentPumpMember() {
      const name = prompt("Nhập tên Thành Viên cần BƠM:");
      const amount = parseInt(prompt("Nhập số điểm muốn bơm:", "5000"));
      if (name && amount > 0) {
        const member = members.find(m => m.username === name);
        if (member) {
          member.points += amount;
          saveData();
          alert(`✅ Đã BƠM ${amount.toLocaleString('vi-VN')} điểm cho ${name}`);
        } else alert("❌ Không tìm thấy Thành Viên!");
      }
    }

    function agentWithdrawMember() {
      const name = prompt("Nhập tên Thành Viên cần RÚT:");
      const amount = parseInt(prompt("Nhập số điểm muốn rút:", "3000"));
      if (name && amount > 0) {
        const member = members.find(m => m.username === name);
        if (member) {
          if (member.points >= amount) {
            member.points -= amount;
            saveData();
            alert(`✅ Đã RÚT ${amount.toLocaleString('vi-VN')} điểm từ ${name}`);
          } else alert("❌ Thành Viên không đủ điểm!");
        } else alert("❌ Không tìm thấy Thành Viên!");
      }
    }

    // ==================== THÀNH VIÊN ====================
    function showPlayer() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">Chào ${currentUser.username}</h2>`;
      
      html += `<h3 class="font-bold mb-4">⚽ Bóng Đá Ảo</h3>`;
      const matches = [
        {match: "Man City vs Liverpool", home:1.85, draw:3.6, away:4.1},
        {match: "Real Madrid vs Barcelona", home:2.1, draw:3.4, away:3.2}
      ];

      matches.forEach(m => {
        html += `
          <div class="bg-zinc-900 p-5 rounded-3xl mb-6">
            <h4 class="font-bold mb-3">${m.match}</h4>
            <div class="grid grid-cols-3 gap-3">
              <button onclick="bet(${m.home}, 'Thắng', '${m.match}')" class="bg-green-600 py-6 rounded-2xl font-bold">${m.home}</button>
              <button onclick="bet(${m.draw}, 'Hòa', '${m.match}')" class="bg-yellow-600 py-6 rounded-2xl font-bold">${m.draw}</button>
              <button onclick="bet(${m.away}, 'Thua', '${m.match}')" class="bg-red-600 py-6 rounded-2xl font-bold">${m.away}</button>
            </div>
          </div>`;
      });

      html += `
        <h3 class="font-bold mb-4 mt-8">🎲 Tài Xỉu</h3>
        <button onclick="playTaiXiu()" class="w-full bg-purple-600 py-8 rounded-3xl font-bold mb-6">Chơi Tài Xỉu</button>
        <h3 class="font-bold mb-4">🐟 Bắn Cá</h3>
        <button onclick="playBanCa()" class="w-full bg-cyan-600 py-8 rounded-3xl font-bold">Bắn Cá</button>`;

      document.getElementById('tabContent').innerHTML = html;
    }

    function bet(odds, choice, match) {
      const amount = parseInt(prompt(`Cược ${choice} - ${match}\nTỉ lệ: ${odds}\nNhập số điểm:`, "1000"));
      if (!amount || isNaN(amount) || amount <= 0 || amount > currentUser.points) {
        return alert("❌ Số điểm không hợp lệ hoặc không đủ!");
      }

      currentUser.points -= amount;
      const win = Math.random() > 0.48;
      let resultText = "Thua";

      if (win) {
        const winAmount = Math.round(amount * odds);
        currentUser.points += winAmount;
        resultText = "Thắng";
        alert(`🎉 THẮNG! +${winAmount} điểm`);
      } else {
        alert("😢 Thua. Thử lại!");
      }

      history.unshift({
        time: new Date().toLocaleTimeString('vi-VN'),
        user: currentUser.username,
        bet: `${match} - ${choice} ${amount}`,
        result: resultText
      });
      saveData();
      updatePointsDisplay();
    }

    function playTaiXiu() {
      if (confirm("Chơi Tài Xỉu 5000 điểm?")) {
        const win = Math.random() > 0.5;
        alert(win ? "🎉 THẮNG Tài Xỉu!" : "😢 Thua Tài Xỉu");
        history.unshift({time: new Date().toLocaleTimeString('vi-VN'), user: currentUser.username, bet: "Tài Xỉu 5000", result: win ? "Thắng" : "Thua"});
        saveData();
      }
    }

    function playBanCa() {
      if (confirm("Chơi Bắn Cá 3000 điểm?")) {
        const win = Math.random() > 0.45;
        alert(win ? "🎉 BẮN TRÚNG CÁ LỚN!" : "🐟 Bắn hụt...");
        history.unshift({time: new Date().toLocaleTimeString('vi-VN'), user: currentUser.username, bet: "Bắn Cá 3000", result: win ? "Thắng" : "Thua"});
        saveData();
      }
    }

    function showHistory() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">📜 Lịch Sử Cược</h2>`;
      if (history.length === 0) html += `<p class="text-center text-zinc-400">Chưa có lịch sử</p>`;
      else history.forEach(h => {
        html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3 text-sm">${h.time} - ${h.user}<br>${h.bet} → <strong>${h.result}</strong></div>`;
      });
      document.getElementById('tabContent').innerHTML = html;
    }
  </script>
</body>
</html>
