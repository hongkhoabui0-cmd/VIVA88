<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88 - Cá Cược Điểm Ảo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover fixed; 
    }
    .card { background: rgba(15, 23, 42, 0.95); }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-md mx-auto p-4" id="app">

    <!-- LOGIN -->
    <div id="loginScreen">
      <div class="text-center py-12">
        <h1 class="text-6xl font-black text-red-500">VIVA88</h1>
        <p class="text-sky-400 text-2xl mt-2">Cá Cược Điểm Ảo</p>
      </div>
      <input id="username" type="text" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl bg-zinc-900 mb-4">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-900 mb-6">
        <option value="member">Thành Viên</option>
        <option value="agent">Đại Lý</option>
        <option value="admin">Admin (Khoa)</option>
      </select>
      <button onclick="login()" class="w-full py-5 bg-red-600 rounded-2xl font-bold text-xl">ĐĂNG NHẬP</button>
    </div>

    <!-- MAIN -->
    <div id="mainScreen" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h1 id="title" class="text-3xl font-bold"></h1>
        <button onclick="logout()" class="px-6 py-2 bg-zinc-700 rounded-xl">Đăng xuất</button>
      </div>
      <div id="panel" class="space-y-6"></div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let data = JSON.parse(localStorage.getItem('viva88Data')) || {
      adminPoints: 1000000000,
      agents: [],
      members: [],
      history: []
    };

    function saveData() {
      localStorage.setItem('viva88Data', JSON.stringify(data));
    }

    function login() {
      const username = document.getElementById('username').value.trim();
      const role = document.getElementById('role').value;
      if (!username) return alert("Vui lòng nhập tên!");

      currentUser = { username, role };
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      renderPanel();
    }

    function logout() {
      currentUser = null;
      document.getElementById('mainScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    }

    function renderPanel() {
      const panel = document.getElementById('panel');
      let html = '';

      if (currentUser.role === 'admin') {
        document.getElementById('title').innerHTML = `👑 Admin - ${currentUser.username} (${data.adminPoints.toLocaleString()} đ)`;
        html = adminPanel();
      } else if (currentUser.role === 'agent') {
        document.getElementById('title').innerHTML = `👔 Đại Lý - ${currentUser.username}`;
        html = agentPanel();
      } else {
        document.getElementById('title').innerHTML = `⚽ Thành Viên - ${currentUser.username}`;
        html = memberPanel();
      }
      panel.innerHTML = html;
    }

    // ====================== ADMIN PANEL ======================
    function adminPanel() {
      return `
        <div class="card p-6 rounded-3xl space-y-4">
          <button onclick="createAgent()" class="w-full py-4 bg-blue-600 rounded-2xl">Tạo Đại Lý Mới</button>
          <button onclick="createMember()" class="w-full py-4 bg-blue-600 rounded-2xl">Tạo Thành Viên Mới</button>
          <button onclick="showAgents()" class="w-full py-4 bg-emerald-600 rounded-2xl">📋 Danh Sách Đại Lý + Điểm</button>
          <button onclick="showMembers()" class="w-full py-4 bg-emerald-600 rounded-2xl">📋 Danh Sách Thành Viên + Điểm</button>
          <button onclick="adminPumpWithdraw()" class="w-full py-4 bg-purple-600 rounded-2xl">💰 Nạp / Rút Điểm Đại Lý & Thành Viên</button>
          <button onclick="showAIPrediction()" class="w-full py-4 bg-amber-600 rounded-2xl">🤖 AI Dự Đoán</button>
        </div>`;
    }

    function adminPumpWithdraw() {
      const type = prompt("Nạp hay Rút? (nhap/rut)", "nhap");
      const target = prompt("Đối tượng? (daily/thanhvien)", "daily");
      const name = prompt("Nhập tên:");
      const amount = parseInt(prompt("Nhập số điểm:", "10000"));

      if (!name || !amount) return alert("Thiếu thông tin!");

      let list = target === "daily" ? data.agents : data.members;
      let item = list.find(x => x.username === name);

      if (!item) return alert("Không tìm thấy người dùng!");

      if (type === "nhap") {
        if (target === "daily") data.adminPoints -= amount;
        item.points += amount;
        alert(`✅ Đã NẠP ${amount.toLocaleString()} điểm cho ${name}`);
      } else {
        if (item.points < amount) return alert("Không đủ điểm để rút!");
        if (target === "daily") data.adminPoints += amount;
        item.points -= amount;
        alert(`✅ Đã RÚT ${amount.toLocaleString()} điểm từ ${name}`);
      }
      saveData();
    }

    // ====================== ĐẠI LÝ PANEL ======================
    function agentPanel() {
      return `
        <div class="card p-6 rounded-3xl space-y-4">
          <button onclick="createMember()" class="w-full py-4 bg-blue-600 rounded-2xl">Tạo Thành Viên Mới</button>
          <button onclick="showMembers()" class="w-full py-4 bg-emerald-600 rounded-2xl">📋 Danh Sách Thành Viên + Điểm</button>
          <button onclick="agentPumpWithdraw()" class="w-full py-4 bg-purple-600 rounded-2xl">💰 Nạp / Rút Điểm Thành Viên</button>
          <button onclick="showAIPrediction()" class="w-full py-4 bg-amber-600 rounded-2xl">🤖 AI Dự Đoán</button>
        </div>`;
    }

    function agentPumpWithdraw() {
      const type = prompt("Nạp hay Rút? (nhap/rut)", "nhap");
      const name = prompt("Nhập tên Thành Viên:");
      const amount = parseInt(prompt("Nhập số điểm:", "10000"));

      if (!name || !amount) return alert("Thiếu thông tin!");

      let member = data.members.find(m => m.username === name);
      if (!member) return alert("Không tìm thấy thành viên!");

      if (type === "nhap") {
        member.points += amount;
        alert(`✅ Đã NẠP ${amount.toLocaleString()} điểm cho ${name}`);
      } else {
        if (member.points < amount) return alert("Thành viên không đủ điểm để rút!");
        member.points -= amount;
        alert(`✅ Đã RÚT ${amount.toLocaleString()} điểm từ ${name}`);
      }
      saveData();
    }

    // ====================== THÀNH VIÊN ======================
    function memberPanel() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-center">⚽ WORLD CUP 2026 - 104 TRẬN</h2>`;
      const teams = ["Brazil","Argentina","France","England","Spain","Germany","Portugal","Netherlands","Italy","Belgium","Mexico","USA","Japan","South Korea","Vietnam","Thailand","Morocco","Senegal"];

      for (let i = 1; i <= 104; i++) {
        const t1 = teams[(i-1) % teams.length];
        const t2 = teams[(i + 5) % teams.length];
        html += `
          <div class="match-card rounded-3xl p-5 mb-5 border border-sky-400/30">
            <div class="text-sky-400 text-xs">#${i}</div>
            <div class="text-xl font-bold">${t1} vs ${t2}</div>
            <div class="grid grid-cols-3 gap-2 mt-4">
              <button onclick="placeBet('${t1} vs ${t2}', 'home', 1.85)" class="py-3 bg-green-600 rounded-xl text-sm">Nhà<br>1.85</button>
              <button onclick="placeBet('${t1} vs ${t2}', 'draw', 3.4)" class="py-3 bg-yellow-600 rounded-xl text-sm">Hòa<br>3.40</button>
              <button onclick="placeBet('${t1} vs ${t2}', 'away', 2.1)" class="py-3 bg-red-600 rounded-xl text-sm">Khách<br>2.10</button>
            </div>
          </div>`;
      }
      return html;
    }

    function placeBet(match, type, odds) {
      const amount = parseInt(prompt(`Đặt cược ${match}\nKèo: ${type === 'home' ? 'Nhà' : type === 'draw' ? 'Hòa' : 'Khách'}\nTỉ lệ: ${odds}\nNhập số điểm:`, "10000"));
      if (!amount || amount <= 0) return alert("Số điểm không hợp lệ!");

      alert(`✅ Đã cược ${amount.toLocaleString()} điểm cho ${match}`);

      if (Math.random() > 0.45) {
        const win = Math.floor(amount * odds);
        alert(`🎉 THẮNG! +${win.toLocaleString()} điểm`);
      } else {
        alert("😢 Thua cược.");
      }
    }

    function showAgents() { /* ... */ }
    function showMembers() { /* ... */ }
    function showAIPrediction() {
      alert("🤖 AI VIVA88 đang dự đoán kết quả World Cup 2026...");
    }

    window.onload = () => {};
  </script>
</body>
</html>
