<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div id="loginScreen" class="bg-zinc-900 rounded-3xl p-6">
      <h2 class="text-xl font-bold mb-4">Đăng Nhập</h2>
      <input id="username" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black" value="Khoa">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
        <option value="player">Thành viên</option>
        <option value="agent">Đại lý</option>
        <option value="admin">Admin</option>
      </select>
      <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
    </div>

    <div id="mainScreen" class="hidden">
      <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-t-3xl">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-6 py-3 rounded-2xl font-bold">Đăng xuất</button>
      </div>
      <div id="userInfo" class="bg-zinc-900 p-4 text-center border-b border-zinc-700"></div>
      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let currentUser = {};
    let history = JSON.parse(localStorage.getItem('history')) || [];
    let agents = JSON.parse(localStorage.getItem('agents')) || [];
    let members = JSON.parse(localStorage.getItem('members')) || [];

    function saveData() {
      localStorage.setItem('agents', JSON.stringify(agents));
      localStorage.setItem('members', JSON.stringify(members));
      localStorage.setItem('history', JSON.stringify(history));
    }

    function login() {
      const username = document.getElementById('username').value.trim();
      const role = document.getElementById('role').value;

      if (!username) return alert("Vui lòng nhập tên!");

      currentUser = { username, role };
      
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      
      document.getElementById('userInfo').innerHTML = `
        <p class="text-green-400">Chào ${username} (${role})</p>
        <p class="text-4xl font-bold text-yellow-400" id="pointsDisplay">50.000 Điểm</p>
      `;

      if (role === 'admin') showAdmin();
      else if (role === 'agent') showAgent();
      else showPlayer();
    }

    function logout() { location.reload(); }

    // Tạo Đại lý (Admin)
    function createAgent() {
      const name = prompt("Nhập tên Đại Lý mới:");
      if (name) {
        agents.push({username: name, role: "agent"});
        saveData();
        alert(`✅ Tạo Đại Lý ${name} thành công!`);
      }
    }

    // Tạo Thành viên (Đại lý)
    function createMember() {
      const name = prompt("Nhập tên Thành Viên mới:");
      if (name) {
        members.push({username: name, role: "player"});
        saveData();
        alert(`✅ Tạo Thành Viên ${name} thành công!`);
      }
    }

    function showAdmin() {
      let html = `<h2 class="text-2xl font-bold mb-6">👑 Admin Panel</h2>
        <button onclick="createAgent()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold mb-4">Tạo Đại Lý Mới</button>
        <button onclick="showHistory()" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Xem Lịch Sử</button>`;
      document.getElementById('tabContent').innerHTML = html;
    }

    function showAgent() {
      let html = `<h2 class="text-2xl font-bold mb-6">Đại Lý Panel</h2>
        <button onclick="createMember()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold mb-4">Tạo Thành Viên Mới</button>
        <button onclick="showHistory()" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Xem Lịch Sử</button>`;
      document.getElementById('tabContent').innerHTML = html;
    }

    function showPlayer() {
      // Giữ nguyên phần Bóng Đá + AI + Tài Xỉu + Bắn Cá như code trước
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">Chào ${currentUser.username}</h2>`;
      // ... (thêm phần bóng đá, AI, tài xỉu, bắn cá như code cũ)
      document.getElementById('tabContent').innerHTML = html + `<p class="text-center text-zinc-400">Chức năng chơi game đang hoạt động</p>`;
    }

    function showHistory() {
      // code lịch sử...
      document.getElementById('tabContent').innerHTML = `<h2>Lịch Sử Cược</h2><p>Đang cập nhật...</p>`;
    }
  </script>
</body>
</html>
