<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-6">
      <input id="user" placeholder="Tên đăng nhập (mặc định: Khoa)" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
      <button onclick="start()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
    </div>

    <div id="app" class="hidden">
      <div class="flex justify-between mb-6">
        <h2 id="greeting" class="text-xl font-bold"></h2>
        <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded-xl">Đăng xuất</button>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 mb-6 text-center">
        <p class="text-3xl font-bold text-yellow-400" id="points">50.000 Điểm</p>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6">
        <h3 class="font-bold mb-4 text-orange-400">Man City vs Liverpool</h3>
        <div class="grid grid-cols-3 gap-4">
          <button onclick="bet(1.85, 'Thắng')" class="bg-green-600 py-8 rounded-2xl font-bold">1.85</button>
          <button onclick="bet(3.6, 'Hòa')" class="bg-yellow-600 py-8 rounded-2xl font-bold">3.60</button>
          <button onclick="bet(4.1, 'Thua')" class="bg-red-600 py-8 rounded-2xl font-bold">4.10</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let points = 50000;

    function start() {
      document.querySelector('#app').classList.remove('hidden');
      document.getElementById('greeting').innerHTML = 'Chào Khoa';
      document.getElementById('points').textContent = points.toLocaleString('vi-VN') + " Điểm";
    }

    function bet(odds, choice) {
      const amount = prompt(`Cược ${choice} - Tỉ lệ ${odds}\nNhập số điểm:`, "1000");
      if (!amount) return;
      const betAmount = parseInt(amount);
      if (isNaN(betAmount) || betAmount <= 0) return alert("Số điểm không hợp lệ!");
      if (betAmount > points) return alert("Không đủ điểm!");

      points -= betAmount;
      document.getElementById('points').textContent = points.toLocaleString('vi-VN') + " Điểm";
      alert(`✅ Cược ${choice} thành công!`);
    }
  </script>
</body>
</html>
