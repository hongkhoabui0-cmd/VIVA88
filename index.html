<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88 - AI Dự Đoán</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e40af, #312e81); }
    .match-card {
      background: linear-gradient(145deg, #1e2937, #334155);
      transition: all 0.3s;
    }
    .match-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
  </style>
</head>
<body class="text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <div class="text-center mb-10">
      <h1 class="text-7xl font-bold text-red-500 tracking-widest">VIVA88</h1>
      <p class="text-sky-400 text-2xl font-medium mt-2">AI DỰ ĐOÁN BÓNG ĐÁ</p>
      <p class="text-amber-400 text-sm mt-1">World Cup 2026 Qualifiers & 5 Giải Lớn</p>
    </div>

    <div id="content" class="space-y-6"></div>
  </div>

  <script>
    const API_KEY = "9fb24f52024e8386a86543601550d805";

    async function loadMatches() {
      document.getElementById('content').innerHTML = `<p class="text-center py-12">Đang tải dữ liệu từ API...</p>`;

      try {
        const res = await fetch("https://api-football-v1.p.rapidapi.com/v3/fixtures?next=50", {
          headers: {
            "x-rapidapi-key": API_KEY,
            "x-rapidapi-host": "api-football-v1.p.rapidapi.com"
          }
        });
        const data = await res.json();

        let html = `<h2 class="text-2xl font-bold mb-8 text-center text-amber-400">🔥 Trận Sắp Diễn Ra</h2>`;

        data.response.slice(0, 15).forEach(f => {
          const home = f.teams.home.name;
          const away = f.teams.away.name;
          const league = f.league.name;
          html += `
            <div class="match-card rounded-3xl p-6 mb-6 border border-sky-500/30">
              <div class="text-sky-400 text-xs mb-1">${league}</div>
              <div class="font-bold text-lg">${home} <span class="text-red-500">VS</span> ${away}</div>
              <button onclick="getPrediction('${home} vs ${away}')" class="w-full mt-5 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 py-5 rounded-2xl font-bold text-lg">
                🤖 AI DỰ ĐOÁN
              </button>
            </div>`;
        });

        document.getElementById('content').innerHTML = html;
      } catch (e) {
        generatePopularMatches();
      }
    }

    function generatePopularMatches() {
      const popular = [
        {match: "Man City vs Liverpool", league: "Premier League"},
        {match: "Real Madrid vs Barcelona", league: "La Liga"},
        {match: "Bayern Munich vs Dortmund", league: "Bundesliga"},
        {match: "Juventus vs Inter", league: "Serie A"},
        {match: "Paris SG vs Marseille", league: "Ligue 1"},
        {match: "Vietnam vs Thailand", league: "ASEAN Cup"},
        {match: "Brazil vs Argentina", league: "World Cup Qualifier"},
        {match: "England vs Germany", league: "Friendly"},
        {match: "Saudi Arabia vs Japan", league: "World Cup Qualifier"},
        {match: "Portugal vs Spain", league: "Nations League"}
      ];

      let html = `<h2 class="text-2xl font-bold mb-8 text-center text-amber-400">🔥 Các Trận Nổi Bật</h2>`;
      popular.forEach(m => {
        html += `
          <div class="match-card rounded-3xl p-6 mb-6 border border-sky-500/30">
            <div class="text-sky-400 text-xs mb-1">${m.league}</div>
            <div class="font-bold text-lg">${m.match}</div>
            <button onclick="getPrediction('${m.match}')" class="w-full mt-5 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 py-5 rounded-2xl font-bold text-lg">
              🤖 AI DỰ ĐOÁN
            </button>
          </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    function getPrediction(match) {
      const prob = Math.floor(Math.random() * 40) + 52;
      alert(`🤖 AI DỰ ĐOÁN\n\nTrận: ${match}\nXác suất Thắng Nhà: ${prob}%\n\n💡 Gợi ý: Nên cược Thắng!`);
    }

    window.onload = loadMatches;
  </script>
</body>
</html>
