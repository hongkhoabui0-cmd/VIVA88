<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-6xl font-bold text-red-500 text-center mb-8">VIVA88</h1>

    <div id="loginScreen" class="bg-zinc-900 rounded-3xl p-6">
      <input id="username" value="Khoa" class="w-full p-4 rounded-2xl bg-zinc-800 mb-4 text-black">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-800 mb-6 text-black">
        <option value="player">Thành viên</option>
        <option value="agent">Đại lý</option>
        <option value="admin">Admin (Khoa)</option>
      </select>
      <button onclick="login()" class="w-full bg-green-600 py-5 rounded-3xl font-bold text-xl">Vào Website</button>
    </div>

    <div id="mainScreen" class="hidden">
      <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-t-3xl">
        <h1 class="text-4xl font-bold text-red-500">VIVA88</h1>
        <button onclick="logout()" class="bg-red-600 px-6 py-3 rounded-2xl font-bold">Đăng xuất</button>
      </div>
      <div id="userInfo" class="bg-zinc-900 p-4 text-center border-b border-zinc-700"></div>
      <div id="tabContent" class="p-4"></div>
    </div>
  </div>

  <script>
    let points = 50000;
    let history = [];
    let agents = [];
    let members = [];

    function login() {
      const role = document.getElementById('role').value;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.remove('hidden');
      
      document.getElementById('userInfo').innerHTML = `
        <p class="text-green-400">Chào Khoa (${role})</p>
        <p class="text-4xl font-bold text-yellow-400" id="pointsDisplay">${points.toLocaleString('vi-VN')} Điểm</p>
      `;

      if (role === 'admin') showAdmin();
      else if (role === 'agent') showAgent();
      else showPlayer();
    }

    function logout() { location.reload(); }
    function updatePoints() {
      document.getElementById('pointsDisplay').textContent = points.toLocaleString('vi-VN') + " Điểm";
    }

    function getMatches() {
      return [
        {match: "Man City vs Liverpool", home: (1.7 + Math.random()).toFixed(2), draw: (3.4 + Math.random()).toFixed(2), away: (4.0 + Math.random()).toFixed(2)},
        {match: "Real Madrid vs Barcelona", home: (2.0 + Math.random()).toFixed(2), draw: (3.3 + Math.random()).toFixed(2), away: (3.1 + Math.random()).toFixed(2)}
      ];
    }

    function bet(odds, choice) {
      const amount = parseInt(prompt(`Cược ${choice}\nTỉ lệ: ${odds}\nNhập số điểm:`, "1000"));
      if (!amount || isNaN(amount) || amount <= 0) return alert("❌ Số điểm không hợp lệ!");
      if (amount > points) return alert("❌ Không đủ điểm!");

      points -= amount;
      updatePoints();

      const win = Math.random() > 0.5;
      if (win) {
        const winAmount = Math.round(amount * parseFloat(odds));
        points += winAmount;
        updatePoints();
        alert(`🎉 THẮNG! +${winAmount} điểm`);
      } else {
        alert("😢 Thua. Thử lại!");
      }
      
      history.unshift({time: new Date().toLocaleTimeString('vi-VN'), bet: `${choice} ${amount}đ (${odds})`, result: win ? "Thắng" : "Thua"});
    }

    // AI Dự Đoán
    function aiPredict(match) {
      const prob = (Math.random() * 30 + 45).toFixed(0);
      alert(`🤖 AI Dự Đoán ${match}\nXác suất Thắng: ${prob}% \nGợi ý: Nên cược Thắng!`);
    }

    function showPlayer() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">🎮 Thành Viên</h2>`;
      
      html += `<h3 class="font-bold mb-3">⚽ Bóng Đá Ảo</h3>`;
      getMatches().forEach(m => {
        html += `
          <div class="bg-zinc-900 p-5 rounded-3xl mb-6">
            <h4 class="font-bold mb-2">${m.match}</h4>
            <button onclick="aiPredict('${m.match}')" class="bg-blue-600 w-full py-2 rounded-2xl mb-3">🤖 AI Dự Đoán</button>
            <div class="grid grid-cols-3 gap-3">
              <button onclick="bet(${m.home}, 'Thắng')" class="bg-green-600 py-6 rounded-2xl font-bold">${m.home}</button>
              <button onclick="bet(${m.draw}, 'Hòa')" class="bg-yellow-600 py-6 rounded-2xl font-bold">${m.draw}</button>
              <button onclick="bet(${m.away}, 'Thua')" class="bg-red-600 py-6 rounded-2xl font-bold">${m.away}</button>
            </div>
          </div>`;
      });

      html += `
        <h3 class="font-bold mb-3 mt-8">🎲 Tài Xỉu</h3>
        <button onclick="playTaiXiu()" class="w-full bg-purple-600 py-8 rounded-3xl font-bold mb-6">Chơi Tài Xỉu (5000 điểm)</button>
        
        <h3 class="font-bold mb-3">🐟 Bắn Cá</h3>
        <button onclick="playBanCa()" class="w-full bg-cyan-600 py-8 rounded-3xl font-bold">Bắn Cá (3000 điểm)</button>`;

      document.getElementById('tabContent').innerHTML = html;
    }

    function playTaiXiu() { /* giữ nguyên từ code trước */ 
      if (points < 5000) return alert("Không đủ điểm!");
      points -= 5000; updatePoints();
      const win = Math.random() > 0.5;
      if (win) { points += 10000; updatePoints(); alert("🎉 THẮNG +10.000!"); }
      else alert("😢 Thua");
      history.unshift({time: new Date().toLocaleTimeString('vi-VN'), bet: "Tài Xỉu 5000", result: win ? "Thắng" : "Thua"});
    }

    function playBanCa() { /* giữ nguyên */ 
      if (points < 3000) return alert("Không đủ điểm!");
      points -= 3000; updatePoints();
      if (Math.random() > 0.45) { points += 15000; updatePoints(); alert("🎉 BẮN TRÚNG +15.000!"); }
      else alert("🐟 Bắn hụt!");
      history.unshift({time: new Date().toLocaleTimeString('vi-VN'), bet: "Bắn Cá 3000", result: "Thắng"});
    }

    function showAgent() {
      document.getElementById('tabContent').innerHTML = `
        <h2 class="text-2xl font-bold mb-6 text-orange-400">Đại Lý Panel</h2>
        <div class="space-y-4">
          <button onclick="createMember()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold">Tạo Thành Viên Mới</button>
          <button onclick="agentAction('bơm')" class="w-full bg-orange-600 py-6 rounded-3xl font-bold">Bơm Điểm Thành Viên</button>
          <button onclick="agentAction('rút')" class="w-full bg-red-600 py-6 rounded-3xl font-bold">Rút Điểm Thành Viên</button>
          <button onclick="showHistory()" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Xem Lịch Sử</button>
        </div>`;
    }

    function showAdmin() {
      document.getElementById('tabContent').innerHTML = `
        <h2 class="text-2xl font-bold mb-6 text-orange-400">👑 Admin Panel - Khoa</h2>
        <div class="space-y-4">
          <button onclick="createAgent()" class="w-full bg-indigo-600 py-6 rounded-3xl font-bold">Tạo Đại Lý Mới</button>
          <button onclick="adminAction('chinhdiem')" class="w-full bg-orange-600 py-6 rounded-3xl font-bold">Chỉnh Điểm</button>
          <button onclick="showHistory()" class="w-full bg-teal-600 py-6 rounded-3xl font-bold">Xem Lịch Sử</button>
        </div>`;
    }

    function createAgent() {
      const name = prompt("Nhập tên Đại Lý mới:");
      if (name) {
        agents.push(name);
        alert(`✅ Đã tạo Đại Lý: ${name}`);
      }
    }

    function createMember() {
      const name = prompt("Nhập tên Thành Viên mới:");
      if (name) {
        members.push(name);
        alert(`✅ Đã tạo Thành Viên: ${name}`);
      }
    }

    function agentAction(type) {
      const amount = parseInt(prompt(`Nhập số điểm muốn ${type}:`, "10000"));
      if (amount > 0) alert(`✅ ${type.toUpperCase()} ${amount.toLocaleString('vi-VN')} điểm thành công!`);
    }

    function adminAction(type) {
      const amount = parseInt(prompt("Nhập điểm mới:", "100000"));
      if (amount > 0) {
        points = amount;
        updatePoints();
        alert("✅ Chỉnh điểm thành công!");
      }
    }

    function showHistory() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-orange-400">📜 Lịch Sử Cược</h2>`;
      if (history.length === 0) html += `<p class="text-center text-zinc-400">Chưa có lịch sử</p>`;
      else history.forEach(h => {
        html += `<div class="bg-zinc-900 p-4 rounded-2xl mb-3"><small>${h.time}</small><br>${h.bet} → <strong>${h.result}</strong></div>`;
      });
      document.getElementById('tabContent').innerHTML = html;
    }
  </script>
</body>
</html>
