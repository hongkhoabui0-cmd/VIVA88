<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVA88</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://picsum.photos/id/1015/1920/1080') center/cover fixed; }
    .card { background: rgba(15,23,42,0.95); }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-md mx-auto p-4">

    <div id="login">
      <div class="text-center py-12">
        <h1 class="text-6xl font-black text-red-500">VIVA88</h1>
        <p class="text-sky-400 text-2xl">Cá Cược Điểm Ảo</p>
      </div>
      <input id="user" placeholder="Tên đăng nhập" class="w-full p-4 rounded-2xl bg-zinc-900 mb-4">
      <select id="role" class="w-full p-4 rounded-2xl bg-zinc-900 mb-6">
        <option value="member">Thành Viên</option>
        <option value="agent">Đại Lý</option>
        <option value="admin">Admin (Khoa)</option>
      </select>
      <button onclick="login()" class="w-full py-5 bg-red-600 rounded-2xl font-bold text-xl">ĐĂNG NHẬP</button>
    </div>

    <div id="main" class="hidden">
      <div class="flex justify-between mb-6">
        <h1 id="title" class="text-3xl font-bold"></h1>
        <button onclick="logout()" class="px-6 py-2 bg-zinc-700 rounded-xl">Đăng xuất</button>
      </div>
      <div id="content"></div>
    </div>
  </div>

  <script>
    let user = null;
    let db = JSON.parse(localStorage.getItem('vivaDB')) || {adminPoints: 1000000000, agents: [], members: []};

    function save() { localStorage.setItem('vivaDB', JSON.stringify(db)); }

    function login() {
      const name = document.getElementById('user').value.trim();
      const role = document.getElementById('role').value;
      if (!name) return alert("Nhập tên!");

      user = {name, role};

      if (role === 'member') {
        let m = db.members.find(x => x.name === name);
        if (!m) {
          m = {name, points: 50000};
          db.members.push(m);
        }
        user.points = m.points;
        user.data = m;
      }

      document.getElementById('login').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      showScreen();
    }

    function logout() {
      user = null;
      document.getElementById('main').classList.add('hidden');
      document.getElementById('login').classList.remove('hidden');
    }

    function showScreen() {
      let html = '';
      if (user.role === 'admin') {
        document.getElementById('title').innerHTML = '👑 Admin';
        html = `
          <div class="card p-6 rounded-3xl space-y-4">
            <button onclick="create('agent')" class="w-full py-4 bg-blue-600 rounded-2xl">Tạo Đại Lý</button>
            <button onclick="create('member')" class="w-full py-4 bg-blue-600 rounded-2xl">Tạo Thành Viên</button>
            <button onclick="list('agent')" class="w-full py-4 bg-emerald-600 rounded-2xl">Danh sách Đại Lý</button>
            <button onclick="list('member')" class="w-full py-4 bg-emerald-600 rounded-2xl">Danh sách Thành Viên</button>
            <button onclick="napRut('agent')" class="w-full py-4 bg-purple-600 rounded-2xl">Nạp/Rút Đại Lý</button>
            <button onclick="napRut('member')" class="w-full py-4 bg-purple-600 rounded-2xl">Nạp/Rút Thành Viên</button>
          </div>`;
      } else if (user.role === 'agent') {
        document.getElementById('title').innerHTML = '👔 Đại Lý';
        html = `
          <div class="card p-6 rounded-3xl space-y-4">
            <button onclick="create('member')" class="w-full py-4 bg-blue-600 rounded-2xl">Tạo Thành Viên</button>
            <button onclick="list('member')" class="w-full py-4 bg-emerald-600 rounded-2xl">Danh sách Thành Viên</button>
            <button onclick="napRut('member')" class="w-full py-4 bg-purple-600 rounded-2xl">Nạp/Rút Thành Viên</button>
          </div>`;
      } else {
        document.getElementById('title').innerHTML = '⚽ Thành Viên';
        html = memberScreen();
      }
      document.getElementById('content').innerHTML = html;
    }

    function create(type) {
      const name = prompt(`Nhập tên ${type === 'agent' ? 'Đại Lý' : 'Thành Viên'} mới:`);
      if (!name) return;
      if (type === 'agent') db.agents.push({name, points: 50000});
      else db.members.push({name, points: 50000});
      save();
      alert("✅ Tạo thành công!");
    }

    function list(type) {
      let html = `<h2 class="text-2xl font-bold mb-4">Danh sách ${type === 'agent' ? 'Đại Lý' : 'Thành Viên'}</h2>`;
      let list = type === 'agent' ? db.agents : db.members;
      list.forEach(item => {
        html += `<div class="card p-4 rounded-2xl mb-3 flex justify-between"><span>${item.name}</span><span class="text-yellow-400">${item.points.toLocaleString()} đ</span></div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    function napRut(type) {
      const action = prompt("Nạp hay Rút? (nhap/rut)", "nhap");
      const name = prompt(`Nhập tên ${type === 'agent' ? 'Đại Lý' : 'Thành Viên'}:`);
      const amount = parseInt(prompt("Số điểm:", "10000"));
      if (!name || !amount) return;

      let list = type === 'agent' ? db.agents : db.members;
      let item = list.find(x => x.name === name);
      if (!item) return alert("Không tìm thấy!");

      if (action === "nhap") {
        if (type === 'agent' && db.adminPoints < amount) return alert("Admin không đủ điểm!");
        if (type === 'agent') db.adminPoints -= amount;
        item.points += amount;
        alert(`✅ NẠP ${amount.toLocaleString()} cho ${name}`);
      } else {
        if (item.points < amount) return alert("Không đủ điểm!");
        if (type === 'agent') db.adminPoints += amount;
        item.points -= amount;
        alert(`✅ RÚT ${amount.toLocaleString()} từ ${name}`);
      }
      save();
    }

    function memberScreen() {
      let html = `<h2 class="text-2xl font-bold mb-6 text-center">⚽ WORLD CUP 2026</h2>`;
      const teams = ["Brazil","Argentina","France","England","Spain","Germany"];
      for (let i = 1; i <= 20; i++) {
        const t1 = teams[(i-1)%teams.length];
        const t2 = teams[(i+2)%teams.length];
        html += `
          <div class="card rounded-3xl p-5 mb-4">
            <div class="font-bold">${t1} vs ${t2}</div>
            <div class="grid grid-cols-3 gap-2 mt-4">
              <button onclick="bet(${i},1.85)" class="py-3 bg-green-600 rounded-xl text-sm">Nhà 1.85</button>
              <button onclick="bet(${i},3.4)" class="py-3 bg-yellow-600 rounded-xl text-sm">Hòa 3.40</button>
              <button onclick="bet(${i},2.1)" class="py-3 bg-red-600 rounded-xl text-sm">Khách 2.10</button>
            </div>
          </div>`;
      }
      return html + `<div class="text-center text-3xl font-bold text-yellow-400 mt-6">Điểm: ${currentUser.points.toLocaleString()} đ</div>`;
    }

    function bet(id, odds) {
      const amount = parseInt(prompt("Nhập số điểm cược:", "10000"));
      if (!amount || amount > currentUser.points) return alert("Không đủ điểm!");

      currentUser.points -= amount;
      currentUser.memberData.points = currentUser.points;

      alert(`✅ Đã cược ${amount.toLocaleString()} điểm!`);
      renderPanel();   // Cập nhật lại điểm
      saveData();
    }

    function renderPanel() {
      showScreen(); // Refresh màn hình
    }

    window.onload = () => {};
  </script>
</body>
</html>
